name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Config Service
      run: |
        cd config-service
        mvn clean install

    - name: Build Discovery Service
      run: |
        cd discovery-service
        mvn clean install

    - name: Build Gateway Service
      run: |
        cd gateway-service
        mvn clean install

    - name: Build Catalogue Service
      run: |
        cd catalogue-service
        mvn clean install

    - name: Build Commande Service
      run: |
        cd commande-service
        mvn clean install

    - name: Build Paiement Service
      run: |
        cd paiement-service
        mvn clean install

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build & Push Docker Image - Config Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/config-service:latest ./config-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/config-service:latest

    - name: Build & Push Docker Image - Discovery Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:latest ./discovery-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:latest

    - name: Build & Push Docker Image - Gateway Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:latest ./gateway-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:latest

    - name: Build & Push Docker Image - Catalogue Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/catalogue-service:latest ./catalogue-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/catalogue-service:latest

    - name: Build & Push Docker Image - Commande Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/commande-service:latest ./commande-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/commande-service:latest

    - name: Build & Push Docker Image - Paiement Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/paiement-service:latest ./paiement-service
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/paiement-service:latest

    # 6 Setup Helm
    - name: Setup Helm
      uses: azure/setup-helm@v3

    # 7 Deploy services with Helm
    - name: Deploy Config Service
      run: helm upgrade --install config-service ./charts/config-service

    - name: Deploy Discovery Service
      run: helm upgrade --install discovery-service ./charts/discovery-service

    - name: Deploy Gateway Service
      run: helm upgrade --install gateway-service ./charts/gateway-service

    - name: Deploy Catalogue Service
      run: helm upgrade --install catalogue-service ./charts/catalogue-service

    - name: Deploy Commande Service
      run: helm upgrade --install commande-service ./charts/commande-service

    - name: Deploy Paiement Service
      run: helm upgrade --install paiement-service ./charts/paiement-service
