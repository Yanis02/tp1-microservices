name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Config Service
      run: |
        cd config-service
        mvn clean install

    - name: Build Discovery Service
      run: |
        cd discovery-service
        mvn clean install

    - name: Build Gateway Service
      run: |
        cd gateway-service
        mvn clean install

    - name: Build Catalogue Service
      run: |
        cd catalogue-service
        mvn clean install

    - name: Build Commande Service
      run: |
        cd commande-service
        mvn clean install

    - name: Build Paiement Service
      run: |
        cd paiement-service
        mvn clean install

    - name: Build Docker Image - Config Service
      run: docker build -t config-service:latest ./config-service

    - name: Build Docker Image - Discovery Service
      run: docker build -t discovery-service:latest ./discovery-service

    - name: Build Docker Image - Gateway Service
      run: docker build -t gateway-service:latest ./gateway-service

    - name: Build Docker Image - Catalogue Service
      run: docker build -t catalogue-service:latest ./catalogue-service

    - name: Build Docker Image - Commande Service
      run: docker build -t commande-service:latest ./commande-service

    - name: Build Docker Image - Paiement Service
      run: docker build -t paiement-service:latest ./paiement-service
